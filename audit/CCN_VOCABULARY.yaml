  - ccn: "15920"
    title: "DEGAUSSING BUILDING"
    fac_code: "1431"
    rpa_type: "B"
    uom_area: "SF"
    uom_other: "[EA]"
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "DEGAUSSING IS THE SCIENCE DEALING WITH THE METHODS AND TECHNIQUES OF REDUCING A SHIP'S MAGNETIC FIELD SO THAT THE POSSIBILITY OF DETECTION BY MAGNETIC MINES AND OTHER MAGNETIC INFLUENCE DETECTION DEVICES IS MINIMIZED. IT CONSISTS OF TWO FUNCTIONALLY INTERDEPENDENT INSTALLATIONS: AN UNDERWATER DEGAUSSING RANGE INSTALLATION AND THIS FACILITY, WHICH SERVES AS AN INSTRUMENT STATION."
    source_page: 44
  - ccn: "15921"
    title: "DEGAUSSING RANGE"
    fac_code: "1591"
    rpa_type: "S"
    uom_area: null
    uom_other: "[EA]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "A DEGAUSSING RANGE IS AN AREA SET ASIDE IN A CHANNEL OR HARBOR THAT CONTAINS SUBMERGED INSTRUMENTS, CONNECTED TO THE COMPUTER IN THE DEGAUSSING BUILDING (CATEGORY CODE 159 20), WHICH REGISTERS A SHIP'S MAGNETIC SIGNATURE AS IT PASSES THROUGH THE RANGE."
    source_page: 44
  - ccn: "15930"
    title: "DEPERMING BUILDING"
    fac_code: "1431"
    rpa_type: "B"
    uom_area: "SF"
    uom_other: "[EA]"
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "A DEPERMING BUILDING IS A FACILITY THAT CONTAINS ELECTRICAL INSTRUMENTS USED TO REGULATE AND MONITOR THE DEPERMING OPERATION. DEPERMING, THE SECOND PHASE OF DEGAUSSING, IS THE PROCESS BY WHICH A SHIP'S PERMANENT LONGITUDINAL AND ATHWARTSHIP MAGNETISM IS REMOVED AND ITS PERMANENT VERTICAL MAGNETISM STABILIZED AT A LOW LEVEL."
    source_page: 44
  - ccn: "15950"
