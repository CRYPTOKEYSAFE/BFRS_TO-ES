    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "A DIRECTION FINDER BUILDING IS A HIGH FREQUENCY DIRECTION FINDING (HFDF) FACILITY THAT CONTAINS THE TUNING AND RECEIVING EQUIPMENT ASSOCIATED WITH THE AN/FRD-13 ANTENNAS. IT IS ASSOCIATED WITH FUNCTIONS PERFORMED BY VARIOUS DON COMMUNICATIONS, INTELLIGENCE, AND OPERATIONAL MISSIONS."
    source_page: 11
  - ccn: "13160"
