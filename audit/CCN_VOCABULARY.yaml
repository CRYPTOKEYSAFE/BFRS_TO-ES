    rpa_type: "S"
    uom_area: null
    uom_other: "[EA]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "A WIND DIRECTION INDICATOR PROVIDES VISUAL INFORMATION OF THE SURFACE WIND DIRECTION AND GENERAL INDICATION OF THE WIND SPEED TO THE AIRCREW. THIS WIND INFORMATION IS MOST USEFUL DURING TAKEOFF, FOR ORIENTATION TO MAKE AN APPROACH, AND IN THE FINAL PHASE OF APPROACH PRIOR TO TOUCHDOWN."
    source_page: 18
  - ccn: "13464"
    title: "RUNWAY DISTANCE MARKERS"
    fac_code: "1341"
    rpa_type: "S"
    uom_area: null
    uom_other: "[EA]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "THE PURPOSE OF RUNWAY DISTANCE MARKERS IS TO INDICATE TO AIRCREWS THE DISTANCE REMAINING TO THE END OF THE RUNWAY DURING TAKEOFF AND LANDING. THE RDM PROVIDE THIS INFORMATION FOR DAY AND NIGHT OPERATIONS IN ALL WEATHER CONDITIONS. THE RDM SHOULD BE PROVIDED FOR ALL RUNWAYS WHERE FIXED WING JET AIRCRAFT OPS ARE CONDUCTED AND ARE RECOMMENDED FOR RUNWAYS INTENDED FOR OPS OF PROPELLER TYPE AIRCRAFT."
    source_page: 18
  - ccn: "13466"
    title: "VOR/TACAN CHK SIGN"
    fac_code: "1341"
    rpa_type: "S"
    uom_area: null
    uom_other: "[EA]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "A VOR/TACAN CHECK SIGN PROVIDES INFORMATION FOR THE PILOT WHEN VERIFYING THE OPERATION OF THE NAVIGATIONAL AID IN THE AIRCRAFT BEFORE TAKING OFF. THIS CHECK SIGN IS A VISUAL IDENTIFICATION MARKER ERECTED IN THE AREA ADJACENT TO THE AIRCRAFT HOLDING POINT AT THE TAXIWAY ACCESS TO RUNWAY ENDS."
    source_page: 18
  - ccn: "13470"
    title: "RADAR TOWER"
    fac_code: "1341"
    rpa_type: "S"
    uom_area: null
    uom_other: "[EA]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "RADAR TOWERS ARE TOWERS HOSTING VARIOUS RADAR SYSTEMS AND MUST BE PLANNED ON AN INDIVIDUAL BASIS."
    source_page: 19
  - ccn: "13471"
    title: "AVIATION METEORLOGICAL FAC"
    fac_code: "1341"
    rpa_type: "S"
    uom_area: null
    uom_other: "[EA]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "WEATHER FORECASTING FACILITY THAT SUPPORTS AIR OPERATIONS."
    source_page: 19
  - ccn: "13510"
    title: "COMM LINES EXCL TELEPHONE"
    fac_code: "1351"
    rpa_type: "LS"
    uom_area: null
    uom_other: "[MI]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "COMMUNICATION LINES PROVIDE CIRCUITS BETWEEN THE VARIOUS ACTIVITIES ON OR OFF THE STATION. THE COMMUNICATIONS NET MAY INCLUDE TRUNK LINE SERVICE CABLE, FEEDER LINES, AND DIRECT CIRCUITS DEPENDING ON THE COMPLEXITY OF THE SYSTEM."
    source_page: 19
  - ccn: "13520"
    title: "TELEPHONE LINES"
    fac_code: "1351"
    rpa_type: "LS"
    uom_area: null
    uom_other: "[MI]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "COMMUNICATION LINES, TO INCLUDE OVERHEAD, UNDERGROUND, AND MARINE CABLES AND LINES."
    source_page: 19
  - ccn: "13610"
    title: "APPROACH LIGHTING"
    fac_code: "1361"
    rpa_type: "S"
    uom_area: null
    uom_other: "[LF]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "APPROACH LIGHTING ENHANCES THE AIRCREW¿S ABILITY TO ACQUIRE THE RUNWAY ENVIRONMENT VISUALLY WHEN MAKING AN APPROACH FOR LANDING DURING PERIODS OF REDUCED VISIBILITY. VISUAL CUES FOR DIRECTIONAL AND ROLL GUIDANCE ARE PROVIDED TO THE AIRCREW FOR OPERATIONS AT NIGHT AND IN MARGINAL WEATHER CONDITIONS BY DAY. THE SYSTEM INCLUDES BOTH APPROACH LIGHTS AND SEQUENCED FLASHERS."
    source_page: 19
  - ccn: "13620"
    title: "APRON & PKG APRN LIGHTING"
    fac_code: "1361"
    rpa_type: "S"
    uom_area: null
    uom_other: "[LF]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "APRON AND PARKING AREA LIGHTING ENABLES THE AIRCREW TO GUIDE THEIR AIRCRAFT INTO POSITION FOR LOADING, SERVICING, OR PARKING AND PROVIDES ILLUMINATION TO PERFORM SUCH FUNCTIONS AS FUELING, MAINTENANCE, LOADING, UNLOADING, AND SECURITY."
    source_page: 20
  - ccn: "13630"
    title: "RUNWAY EDGE LIGHTING"
    fac_code: "1361"
    rpa_type: "S"
    uom_area: null
    uom_other: "[LF]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "THIS CATEGORY CODE INCLUDES TWO GROUPS OF LIGHTS, RUNWAY EDGE LIGHTS, WHICH DEFINE THE LATERAL LIMITS OF THE PAVEMENT, AND CIRCLING GUIDANCE LIGHTS (CGLS), WHICH ENABLE AN AIRBORNE AIRCREW TO LOCATE THE RUNWAY WHILE OFF TO THE SIDE OF THE RUNWAY, AND ESTABLISH THE PROPER TRAFFIC PATTERN."
    source_page: 20
  - ccn: "13635"
    title: "RUNWAY CENTERLINE LIGHTING"
    fac_code: "1361"
    rpa_type: "S"
    uom_area: null
    uom_other: "[LF]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "RUNWAY CENTERLINE LIGHTING PROVIDES VISUAL AID TO ASSIST THE AIRCREW IN KEEPING THE AIRCRAFT CENTERED ON THE RUNWAY DURING TAKE-OFF AND AFTER LANDING AT NIGHT OR IN CONDITION OF REDUCED VISIBILITY. IT IS A SUPPLEMENT TO RUNWAY EDGE LIGHTING AND MARKINGS AND CIRCLING GUIDANCE LIGHTING, CATEGORY CODE 136 30."
    source_page: 20
  - ccn: "13636"
    title: "SIMULATE CARRIER DECK LTG"
    fac_code: "1362"
    rpa_type: "S"
    uom_area: null
    uom_other: "[EA]"
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "A SIMULATED CARRIER DECK IS USED TO TRAIN PILOTS ASHORE FOR LANDING AIRCRAFT UNDER SIMULATED CONDITIONS OF A CARRIER AT SEA. SIMULATED CARRIER DECK LIGHTING AND MARKINGS PERMITS TRAINING DURING THE DAY, NIGHT, AND ADVERSE VISIBILITY CONDITIONS."
    source_page: 20
  - ccn: "13645"
    title: "WHEELS UP / WAVE OFF LTG"
    fac_code: "1362"
    rpa_type: "S"
    uom_area: null
    uom_other: "[EA]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "WHEELS-UP AND WAVE-OFF LIGHTS ARE PROVIDED TO ALLOW EITHER THE WHEEL WATCH, THE LANDING SIGNAL OFFICER (LSO), OR CONTROL TOWER PERSONNEL TO DETERMINE IF A LANDING AIRCRAFT HAS ITS LANDING GEAR FULLY EXTENDED AND/OR TO SIGNAL TO AN AIRCREW TO ABORT OR ¿WAVE-OFF¿ A LANDING ATTEMPT."
    source_page: 20
  - ccn: "13650"
    title: "TAXIWAY LIGHTING"
    fac_code: "1361"
    rpa_type: "S"
    uom_area: null
    uom_other: "[LF]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "TAXIWAY LIGHTING AND MARKINGS DEFINE THE LATERAL LIMITS AND DIRECTION OF A TAXIWAY, CATEGORY CODE 112-10, TO GUIDE AIRCRAFT MOVEMENT BETWEEN THE RUNWAY OPERATIONAL AREA AND THE AIRCRAFT PARKING AREA DURING NIGHT OPERATIONS OR CONDITIONS OF POOR VISIBILITY."
    source_page: 21
  - ccn: "13655"
    title: "TOUCHDOWN ZONE LIGHTING"
    fac_code: "1362"
    rpa_type: "S"
    uom_area: null
    uom_other: "[EA]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "TOUCHDOWN ZONE LIGHTING DELINEATES THE TOUCHDOWN ZONE AND PROVIDES DIRECTIONAL AND ROLL GUIDANCE FOR AIRCRAFT APPROACHING THE THRESHOLD. IT PROVIDES VISUAL CUES FOR MORE ACCURATELY CENTERING THE AIRCRAFT ON THE RUNWAY, ADJUSTING ATTITUDE FOR TOUCHDOWN, AND DETERMINING THE TOUCHDOWN POSITION. THE LIGHTING CONSISTS OF BARS OF WHITE LIGHTS IN THE PAVEMENT ON EACH SIDE OF THE RUNWAY CENTERLINE."
    source_page: 21
  - ccn: "13660"
    title: "THRESHOLD LIGHTING"
    fac_code: "1362"
    rpa_type: "S"
    uom_area: null
    uom_other: "[EA]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "THRESHOLD LIGHTING IS A SYSTEM OF LIGHTS DEFINING THE ENDS OF THE USABLE RUNWAY SURFACE. THEY INCLUDE THRESHOLD LIGHTS, DISPLACED THRESHOLD LIGHTS, RUNWAY END IDENTIFICATION LIGHTS (REIL) AND RUNWAY END LIGHTS. THE THRESHOLD LIGHTS ARE DISPLACED FROM THE EXTREMITY OF THE RUNWAY WHEN A PORTION IS UNAVAILABLE FOR NORMAL OPERATIONS"
    source_page: 21
  - ccn: "13665"
    title: "HELIPORT LIGHTING"
    fac_code: "1361"
    rpa_type: "S"
    uom_area: null
    uom_other: "[LF]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "HELIPORT LIGHTING IS A SYSTEM OF LIGHTS ARRANGED TO CLEARLY DEFINE THE HELICOPTER LANDING PAD FOR OPERATIONS AT NIGHT AND DURING PERIODS OF POOR VISIBILITY. HELIPORT LIGHTING INCLUDES ALL VISUAL REFERENCE ASPECTS OF THE APPROACH AND LANDING OF ROTARY WING AIRCRAFT. THIS INCLUDES VISUAL AIDS, MARKINGS, PERIMETER AND APPROACH LIGHTS, AND RUNWAY AND TAXIWAY LIGHTS."
    source_page: 21
  - ccn: "13720"
    title: "LIGHTHOUSE"
    fac_code: "1371"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: "CP"
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "A LIGHTHOUSE IS A BUILDING THAT HOUSES A NAVIGATION BEACON THAT MAY EMIT LIGHT, SOUND, RADIO, RADAR, OR A COMBINATION THEREOF. IT MAY BE ONSHORE OR OFFSHORE. CONSTRUCTION IS DONE OVERSEAS WHEN APPROPRIATE BY THE NAVAL FACILITIES ENGINEERING COMMAND."
    source_page: 22
  - ccn: "13810"
    title: "BEACON-SHIP"
    fac_code: "1381"
    rpa_type: "S"
    uom_area: null
    uom_other: "[EA]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "THE U.S. COAST GUARD HAS SPECIFIC JURISDICTION OVER ALL AIDS TO NAVIGATION (DAY BEACONS, BUOYS, FOGHORNS, ETC.,) IN THE CONTINENTAL UNITED STATES AND IN ALL OUTLYING TERRITORIES AND POSSESSIONS. DAY BEACONS ARE UNLIGHTED STRUCTURES USED TO MARK ISOLATED DANGERS OR CHANNELS, EDGES, OR ALIGNMENT."
    source_page: 22
  - ccn: "13820"
    title: "NAVIGATION AID TARGET"
    fac_code: "1381"
    rpa_type: "S"
    uom_area: null
    uom_other: "[EA]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "THIS CATEGORY CODE IS TO BE USED FOR NAVIGATIONAL AID TARGETS WHICH ARE A PART OF MARITIME NAVIGATIONAL AIDS."
    source_page: 22
  - ccn: "13825"
    title: "ANTENNA- NAVIGATION"
    fac_code: "1381"
    rpa_type: "S"
    uom_area: null
    uom_other: "[EA]"
    uom_alt: null
    rqmts_rptg_ind: "N"
    description: "THIS CATEGORY CODE IS TO BE USED FOR ANTENNAS OR ANTENNA SYSTEMS WHICH ARE A PART OF MARITIME NAVIGATIONAL AIDS."
    source_page: 22
  - ccn: "14111"
    title: "AIR PASSENGER TERMINAL"
    fac_code: "1412"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "THE AIR PASSENGER TERMINAL PROVIDES FACILITIES FOR PROCESSING AUTHORIZED PASSENGERS AND THEIR BAGGAGE AND FOR PROCESSING INCIDENTAL FREIGHT. SPACE IS PROVIDED IN THE TERMINAL FOR THE FOLLOWING FUNCTIONAL AREAS: ADMINISTRATIVE SPACE, BAGGAGE CLAIM ROOM, CHECK-IN COUNTER, MINOR FREIGHT STORAGE, INFORMATION COUNTER, AND WAITING LOUNGE WITH FOOD CONCESSIONS."
    source_page: 23
  - ccn: "14112"
    title: "AIR CARGO TERMINAL"
    fac_code: "1412"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "AN AIR CARGO TERMINAL IS PLANNED FOR AIR STATIONS WHERE CARGO AND FREIGHT HANDLING EXCEEDS 10,000 POUNDS PER DAY. THE AIR CARGO TERMINAL IS SEPARATE FROM THE AIR PASSENGER TERMINAL WHERE ONLY INCIDENTAL FREIGHT IS HANDLED. AIR CARGO TERMINAL FUNCTIONS INCLUDE RECEIPT OF PACKAGES, CONTROL DOCUMENTATION, PALLETIZATION, HOLDING FOR SHIPMENT, AIRCRAFT LOADING AND UNLOADING."
    source_page: 23
  - ccn: "14113"
    title: "COURIER STATION"
    fac_code: "1412"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "THIS FACILITY IS USED TO STORE AND DISSEMINATE CLASSIFIED MATERIAL FOR MISSION PLANNING, PILOT TRAINING AND BRIEFINGS IN SUPPORT OF ATTACK AIRCRAFT OPERATIONS."
    source_page: 23
  - ccn: "14120"
    title: "ACFT FIRE AND RESCUE STA"
    fac_code: "1411"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "THE AIRCRAFT FIRE AND RESCUE STATION PROVIDES FIRE AND EMERGENCY RESCUE PROTECTION FOR PILOTS AND AIRCRAFT. WHEN FEASIBLE, THE AIRCRAFT FIRE AND RESCUE STATION IS COMBINED WITH THE STRUCTURAL FIRE STATION (CATEGORY CODE 730 10) TO FORM ONE COMPLETE EMERGENCY FACILITY, CATEGORY CODE 141 25, COMBINED STRUCTURAL/ AIRCRAFT FIRE/RESCUE STATION."
    source_page: 23
  - ccn: "14125"
    title: "COMBINED FIRE/RESCUE STA"
    fac_code: "1411"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "A COMBINED STRUCTURAL/AIRCRAFT FIRE/RESCUE STATION IS PLANNED UNDER CERTAIN CONDITIONS TO SERVE THE FUNCTION OF A STRUCTURAL FIRE STATION (CATEGORY CODE 730 10) AND AN AIRCRAFT FIRE AND RESCUE STATIONS. FIRE AND RESCUE STATION. THE COMBINED FACILITY IS PLANNED FOR A LOCATION THAT SATISFIES THE RESPONSE TIME AND DISTANCE REQUIREMENTS FOR BOTH THE STRUCTURAL FIRE AND THE AIRCRAFT FIRE."
    source_page: 24
  - ccn: "14130"
    title: "ACFT LINE OPERATIONS BLDG"
    fac_code: "1412"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "THE AIRCRAFT LINE OPERATIONS BUILDING IS USED TO CENTRALIZE GROUND OPERATIONS OF THE FLIGHT LINE. THE BUILDING IS UTILIZED IN KEEPING OF SQUADRON DAILY FLIGHT BOOKS, AIRCRAFT STATUS BOARDS, AND BULLETIN BOARDS AND AS SUPPORT FOR LINE OPERATIONS PERSONNEL BY PROVIDING SHELTER, A WATER COOLER, AND A CHEMICAL TOILET."
    source_page: 24
  - ccn: "14140"
    title: "ACFT OPS BLDG *EXC 141-70*"
    fac_code: "1412"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "AN AIRCRAFT OPERATIONS BUILDING IS PLANNED FOR ALL NAVY AIR STATIONS, AUXILIARY AIR STATIONS, AND AIR FACILITIES. THE BUILDING HOUSES THE ADMINISTRATION OF FLIGHT OPERATIONAL ACTIVITIES WITH ALL SUPPORTING FUNCTIONS INCLUDING FLIGHT CONTROL, COMMUNICATIONS, AND WEATHER SERVICES."
    source_page: 24
  - ccn: "14141"
    title: "MATCU OPERATIONS BUILDING"
    fac_code: "1412"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "THE MATCU PERFORMS A COMBINED FUNCTION SIMILAR TO THAT ACCOMPLISHED WITH GROUND CONTROL APPROACH (GCA) SYSTEM; TACAN BUILDING; AND, AIR SURVEILLANCE RADAR (ASR) BUILDING. DEPENDING ON THE LEVEL OF AIRCRAFT OPERATIONS, THE MATCU OPERATIONS BUILDING MAY PROVIDE THE SOLE GCA SUPPORT AT AN AIR INSTALLATION OR MAY SUPPLEMENT AND BE IN ADDITION TO PERMANENT ASR, TACAN, AND GCA FACILITIES"
    source_page: 24
  - ccn: "14142"
    title: "AIR INTELLIGENCE SUPPT CTR"
    fac_code: "1444"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "THIS FACILITY IS USED TO STORE AND DISSEMINATE CLASSIFIED MATERIAL FOR MISSION PLANNING, PILOT TRAINING AND BRIEFINGS IN SUPPORT OF ATTACK AIRCRAFT OPERATIONS."
    source_page: 25
  - ccn: "14160"
    title: "VISUAL INFORMATION FAC"
    fac_code: "1441"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "A PHOTOGRAPHIC BUILDING IS PLANNED TO SUPPORT THE PHOTOGRAPHIC MISSION OF AN ACTIVITY. IT PROVIDES THE LABORATORY COMPLETE WITH EQUIPMENT AND STORAGE THAT APPLIES TO THE SPECIFIC MISSION."
    source_page: 25
  - ccn: "14165"
    title: "FLEET RECON PHOTO LAB"
    fac_code: "1441"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "A FLEET RECONNAISSANCE PHOTOGRAPHIC LABORATORY IS PLANNED ONLY WHERE THE STATION SUPPORTS THE MISSION OF PHOTOGRAPHIC RECONNAISSANCE SQUADRONS AND THERE IS NO PHOTOGRAPHIC BUILDING (CATEGORY CODE 141 60) TO PROVIDE THE SUPPORT."
    source_page: 25
  - ccn: "14170"
    title: "CONTROL TWR ATTD/FREE STD"
    fac_code: "1413"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "A CONTROL TOWER PROVIDES SPACE FOR EQUIPMENT AND PERSONNEL TO CONTROL AIRCRAFT TRAFFIC. IT IS AN ELEVATED BUILDING HAVING AN UNOBSTRUCTED LINE-OF SIGHT TO THE AIRFIELD APPROACH AREAS, RUNWAYS, TAXIWAYS, AIRCRAFT PARKING AREAS, AND ALL OTHER AREAS OVER WHICH AIRCRAFT MOVEMENTS MUST BE CONTROLLED."
    source_page: 25
  - ccn: "14181"
    title: "GCA CREW FACILITY"
    fac_code: "1412"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "THE GROUND CONTROL APPROACH (GCA) CREW FACILITY PROVIDES A READY ROOM FOR ON DUTY PERSONNEL ASSIGNED TO THE GCA VAN. THE FACILITY CONSISTS OF TWO (2) STANDARD DESIGN SKID-MOUNTED SHELTERS (EACH 12 FEET BY 20 FEET). THE CREW FACILITY IS AUTHORIZED WHENEVER THE MOBILE GCA UNIT IS FURNISHED."
    source_page: 25
  - ccn: "14182"
    title: "FULL PRESSURE SUIT FAC"
    fac_code: "1412"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "PRESSURE SUIT MAINTENANCE PERFORMED UNDER THIS CATCODE, NORMALLY IN THE PARACHUTE AND SURVIVAL EQUIPMENT SHOP (CATEGORY CODE 211 34). SPECIAL JUSTIFICATION IS REQUIRED TO PROVIDE A SEPARATE FACILITY FOR THIS PURPOSE."
    source_page: 26
  - ccn: "14187"
    title: "LIQUID OXY/NIT FAC(NONIND)"
    fac_code: "4122"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: "GA"
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "A LIQUID OXYGEN/NITROGEN FACILITY IS REQUIRED AT EACH NAVY AND MARINE CORPS AIR STATION WHERE 50 OR MORE ATTACK AND FIGHTER-TYPE AIRCRAFT ATE ASSIGNED. THE FACILITY PROVIDES FOR STORAGE, VAPORIZATION, AND TRANSFER OF NON- INDUSTRIAL OXYGEN AND NITROGEN AND FOR TEST AND REPAIR OF CRYOGENIC EQUIPMENT ASSOCIATED WITH AVIATOR AND AIRCRAFT SUPPORT."
    source_page: 26
  - ccn: "14188"
    title: "HARDENED AIRCRAFT SHELTER"
    fac_code: "1465"
    rpa_type: "S"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "A REINFORCED HANGAR OR SHELTER USED TO PROTECT AIRCRAFT FROM ATTACK AND OFTEN USED IN FORWARD DEPLOYED LOCATIONS."
    source_page: 26
  - ccn: "14210"
    title: "HELIUM PROCESSING PLANT"
    fac_code: "1421"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "A BUILDING FOR THE RECEIPT, BULK STORAGE, PROCESSING, AND DISPENSING OF HELIUM GAS. INCLUDED ARE TANKS, VALVES, VALVE CHAMBERS, AND SIMILAR EQUIPMENT."
    source_page: 26
  - ccn: "14219"
    title: "HELIUM STORAGE BUILDING"
    fac_code: "1421"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "A BUILDING FOR THE STORAGE OF BULK HELIUM GAS."
    source_page: 26
  - ccn: "14220"
    title: "HELIUM STORAGE FACILITY"
    fac_code: "1422"
    rpa_type: "S"
    uom_area: null
    uom_other: "[EA]"
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "A FACILITY, OTHER THAN A BUILDING, FOR THE BULK STORAGE OF HELIUM GAS."
    source_page: 26
  - ccn: "14309"
    title: "EXP OPS SUP FAC"
    fac_code: "1444"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "AN EXPEDITIONARY OPERATIONS SUPPORT MODULE (EOSM) PROVIDES SPACES FOR THE FOLLOWING: ADMIN, MEDICAL, MISSION PLANNING CELL (MAY OR MAY NOT BE PART OF SCIF), TRAINING CLASSROOMS, ARMORY, STORAGE, AND LOCKER AND SHOWER SPACES."
    source_page: 27
  - ccn: "14310"
    title: "EMERGENCY VEHICLE GARAGE"
    fac_code: "5307"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "THIS IS A SHELTER FOR OFFICIAL EMERGENCY AND ALERT VEHICLES, SUCH AS AN AMBULANCE. IT IS JUSTIFIED IN INSTANCES WHEN IMMEDIATE RESPONSE REQUIRED BY SPECIAL WATERFRONT OPERATIONAL VEHICLE."
    source_page: 27
  - ccn: "14311"
    title: "OPERATIONAL VEHICLE GARAGE"
    fac_code: "1444"
    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
