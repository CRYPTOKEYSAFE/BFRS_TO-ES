    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "A SATELLITE COMS FACILITY IS OFTEN REFERRED TO AS A `GATEWAY FACILITY¿ SUPPORTING WORLDWIDE, REGIONAL, AND AREA OF RESPONSIBILITY (AOR) COMS. IT CONTAINS DIVISION LEVEL OFFICE AND SUPPORT REQUIREMENTS, EQUIPMENT AND OPERATIONAL AREAS, MAINTENANCE AND TRAINING AREAS, AND LIMITED STORAGE AREAS FOR READY-TO-ISSUE COMS SYSTEMS AND SUBSYSTEMS REQUIRED FOR INCOMING AND OUTGOING COMS TRAFFIC."
