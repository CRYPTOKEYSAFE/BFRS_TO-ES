    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "A HELIX HOUSE CONTAINS A HELICAL COIL AND ASSOCIATED ANTENNA TUNING DEVICES DIRECTLY ASSOCIATED WITH, AND INTEGRAL TO, THE TRANSMISSION OF LOW FREQUENCY (LF), VERY LOW FREQUENCY (VLF), AND EXTREMELY LOW FREQUENCY (ELF) COMMUNICATIONS."
    source_page: 9
  - ccn: "13135"
