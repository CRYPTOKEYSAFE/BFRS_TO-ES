    description: "A TRANSMITTER BUILDING SUPPORTS A 24 HOUR A DAY, 7 DAY A WEEK OPERATIONAL REQUIREMENT FOR SHORE TO SHORE AND SHORE TO SHIP ADMIN, TACTICAL, AND STRATEGIC HIGH FREQUENCY (HF), LOW FREQUENCY (LF), VERY LOW FREQUENCY (VLF) AND EXTREMELY LOW FREQUENCY (ELF) COMS. A SMALL PERSONNEL SUPPORT SPACE CONTAINING A TOILET FACILITY AND BREAK AREA IS CONSIDERED PART OF THE FACILITY."
