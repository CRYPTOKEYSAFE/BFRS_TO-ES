    description: "THE MILITARY AFFILIATE RADIO SYSTEM IS PART OF NAVY TELECOMMUNICATIONS COMPLEX. SIZE OF THE STATION VARIES WITH THE TYPE OF OPERATIONS AND EQUIPMENT USED. AS A GENERAL RULE, THE SPACE FOR A MARS STATION IS PROVIDED WITHIN EXISTING NAVY FACILITIES AND NO SPECIFIC PROJECTS SHOULD BE PLANNED. THIS CODE IS MAINLY INTENDED FOR INVENTORY PURPOSES."
