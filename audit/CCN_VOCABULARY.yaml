    rpa_type: "B"
    uom_area: "[SF]"
    uom_other: null
    uom_alt: null
    rqmts_rptg_ind: "Y"
    description: "A TELEMETRY BUILDING IS AN EXTREMELY SPECIALIZED AND UNIQUE FACILITY SPECIFICALLY DESIGNED FOR THE TRACKING OF MISSILES AND SATELLITES."
    source_page: 9
  - ccn: "13130"
