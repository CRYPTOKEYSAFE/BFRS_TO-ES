# Layer 3 Classification Rules, machine-readable rule table.
# Loaded by a future pipeline/classify.py to map each billet in a
# T/O&E to a NOTE tag of the form CCN+suffix.
#
# Status: STARTER. General-pattern rules are present and tagged
# confidence=high based on observed CLB-4 / 3d Med Bn vocabulary.
# BMOS-specific rules are confidence=low and need ratification
# against FC 2-000-05N Series 100/200 plus MCO 1200.18 (MOS Manual).
# Apex Omega rule 4 applies: TBD-marked rule rows must not be
# silently filled.

provenance:
  authority: "FC 2-000-05N (Marine Corps BFR), MCO 1200.18 (MOS Manual),
              unit-type doctrine"
  ratified_against: "TBD pending FC 2-000-05N Series 100 / 200 PDF
                     extraction via audit/extract_planning_factors.py"
  source_date: "TBD"
  schema_version: "0.1"

defaults:
  admin_ccn: "61072"  # USMC BN/squadron HQ admin; other unit types
                       # have different defaults per FC 2-000-05N

# General-pattern rules. Apply to every unit unless overridden by a
# BMOS section-residency rule or per-unit override.
rules:

  - id: officer_admin_default
    description: "Officer (O-1 to O-10) of an admin or HQ section"
    when:
      alpha_grade_min: "O-1"
      section: "admin_or_hq"
    tag_template: "{admin_ccn}o"
    confidence: high
    citation: "Observed in CLB-4 SW BFR 61072 ($120 GSF/person);
               ratify against FC 2-000-05N admin facility table"

  - id: snco_admin_default
    description: "SNCO (E-6 to E-9) of an admin or HQ section"
    when:
      alpha_grade_min: "E-6"
      section: "admin_or_hq"
    tag_template: "{admin_ccn}o"
    confidence: high
    citation: "Observed in CLB-4 SW BFR 61072 (120 GSF/person)"

  - id: warrant_admin_default
    description: "Warrant officer (W-1 to W-5) of an admin section"
    when:
      alpha_grade_min: "W-1"
      alpha_grade_max: "W-5"
      section: "admin_or_hq"
    tag_template: "{admin_ccn}o"
    confidence: high
    citation: "Treats warrants as office occupants by default; verify
               unit-specific exceptions"

  - id: junior_enlisted_admin_default
    description: "Junior enlisted (E-1 to E-5) of an admin section"
    when:
      alpha_grade_max: "E-5"
      section: "admin_or_hq"
    tag_template: "{admin_ccn}c"
    confidence: high
    citation: "Observed in CLB-4 SW BFR 61072 (60 GSF/person)"

  # BMOS section-residency rules. confidence=low and TBD on every row.

  - id: bmos_0600_comm
    description: "Comm BMOS, comm/electronics maintenance shop"
    when:
      bmos_prefix: "06"
    tag_template: "21710{comm_section_suffix}"
    confidence: low
    citation: "TBD pending FC 2-000-05N Series 200 comm/elec
