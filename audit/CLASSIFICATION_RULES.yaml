unclassified_disposition:
  emit: orphan
  message: "billet does not match any rule; SME review required"
  do_not_silently_drop: true

# Notes for SMEs filling out this table:
#
# 1. The "section" field on a billet is not a T/O&E column. It is
#    inferred from the unit's organizational structure and the
#    Billet Description field (e.g., "S-1 ADJUTANT" -> admin section,
#    "MOTOR T MAINT CHIEF" -> auto org shop section). The classifier
#    will need a section-inference helper that reads keyword patterns
#    out of Billet Description.
#
# 2. The {admin_ccn} placeholder defaults to 61072 (Marine BN/squadron
#    HQ admin) but per-unit-type defaults differ:
#      Aviation squadrons: 61071 or unit-specific
#      Logistics group HQ: TBD
#      Recruit depot:      TBD
#      Schoolhouse:        TBD
#      MEU command element: TBD
#    Each unit profile must supply its own admin_ccn default.
#
# 3. "comm_section_suffix" is one of rs / cs / ds / ws / shf / ms
#    based on which sub-section the billet belongs to. The classifier
#    will need a sub-section-inference helper (probably keyword match
#    on Billet Description).
#
# 4. Every "TBD" tag_template above is a hard stop. The classifier
#    must not emit a TBD as a real NOTE tag; instead it must emit
#    "unclassified" plus the rule id and citation so the SME can
#    fill the actual tag.
