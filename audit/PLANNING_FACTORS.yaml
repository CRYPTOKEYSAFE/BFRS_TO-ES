          - ["WST2 (WS Type 2)", "A WST2 is an optional space type, similar to WST1 modular workstation, but provides an alternate (usually smaller) size. It may serve as contractor space, hoteling space, or swing space during renovation projects. Depending on an organization's telework and workspace sharing policies, this space type may be dedicated or shared. WST2 space allocations typically range from 36-48 NSF/PN.", "Allocate 48 NSF/PN requiring WST2 space", "• The number of personnel requiring WST2 space is supported by an official personnel loading report."]
