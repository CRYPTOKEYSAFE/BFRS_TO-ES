          - ["Private Office", "A private office provides an enclosed space, typically occupied by supervisory personnel or for those personnel whose job duties require privacy. Depending on an organization's telework and workspace sharing policies, this space type may be dedicated or shared. Private office space allocations typically range from 100-120 NSF/PN.", "Allocate 120 NSF/PN requiring private office space", "• The number of personnel requiring private office space is supported by an official personnel loading report."]
