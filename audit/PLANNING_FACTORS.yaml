      - table_id: "Table 61010-7"
        caption: "2. Functional Support Group Space Types"
        page: 10
        loading_driver: "Personnel"
        headers:
          - ["Archive Storage Room", "An archive storage room provides space for long- term (5+ years) storage of hardcopy files. Storage space may include letter file cabinets, legal file cabinets, flat file cabinets, high density filing systems, etc. Note 1: Archive storage is different from central file storage included within the administrative support space allocations for group working files. Note 2: Archive storage is different from distributed file storage included within a private office or workstation space allocation for individual working files. No planning factors exist for this space type. A space analysis is required.", "Allocate NSF requirement based on specific archive storage needs", "• Mission or functions performed • Records retention requirements per SECNAV M-5210.1 apply • Records types (legal, personnel, real estate, other) • Other justification"]
          - ["Command Suite, Private Office", "A command suite is an office area configuration containing private offices for the command leadership and key staff. Since private offices have already been accounted for in the space loading, this is an additional 80 NSF allocation for Installation Commanding Officers at the 06 level or above, and all flag and/or SES level personnel serving in a supervisory capacity.", "Allocate an additional 50 NSF for each SES/O7 or ICO O6.", "• Number of SES (Senior Executive Service) personnel identified in loading reports • Number of O7 or higher (Rear Admiral, Brigadier General or higher) personnel identified in loading reports • ICO O6 or higher (Installation Commanding Officer – Navy Captain, Full Colonel or higher) identified in loading reports"]
        rows: []
      - table_id: "Table 61010-7"
        caption: "2. Functional Support Group Space Types"
        page: 11
        loading_driver: "TBD"
        headers:
          - ["Hazardous Material Storage Room", "A hazardous material storage room provides storage for flammable, reactive, corrosive or toxic materials. This space type is a dedicated room and does not apply to individual free standing or wall- mounted cabinets within other room types. No planning factors exist for this type of space. A space analysis is required.", "Allocate NSF requirement based on specific hazardous material storage needs", "• Mission or functions performed • Type of hazardous material requiring storage (corrosive, flammable, reactive or toxic) • Supported by space analysis • Other justification"]
          - ["Interview Room", "Interview rooms are used to conduct interviews in a private and professional environment, free of distractions. Plan for up to two interview rooms, located adjacent to an observation room.", "Allocate up to two interview rooms at 120 NSF each", "• Mission or functions performed • Applicable to certain Echelon II IG functions • Applicable to certain NCIS functions • Address feasibility of using CCTV feeds instead of providing an observation room • Other justification (human resource functions, polygraph functions, speech therapy functions, etc.)"]
          - ["Lg Format Production Room", "A large format production room provides space for high-quality, large scale copier, printer, plotter and/or scanner equipment. It should include space for material storage such as large format paper rolls and ink cartridges. This space type typically applies to technical or operational functions. It is not intended for traditional office equipment, which is already accounted for in the admin support space allocation. No planning factors exist for this type of space. A space analysis is required.", "Allocate NSF requirement based on specific large format production equipment", "• Mission or functions performed • Function(s) supported (e.g., architecture, engineering, operational) • Equipment type(s) to be housed (e.g., large scale copiers, printers, plotters, scanners, other) • Other justification"]
        rows: []
      - table_id: "Table 61010-7"
        caption: "2. Functional Support Group Space Types"
        page: 12
        loading_driver: "Personnel"
        headers:
          - ["Locker Room", "A locker room provides temporary storage space for a change in clothing and other personal belongings. • Lockers authorized in support of personnel performing 24-7 operations. Provide one locker per person based on the largest shift. • Lockers authorized in support of physical training requirements for military personnel at remote locations, without access to fitness centers. Provide one locker for every 10 military personnel assigned. • Lockers authorized in support of security personnel. Provide one locker per person based on the largest shift. Use the guidance above to determine the number of lockers required.", "Allocate lockers at 8 NSF each", "• Mission or functions performed • Access to a fitness center is greater than a 15-minute drive time • Military, civilian and/or contractor personnel may require lockers in support of 24-7 shift or emergency operations • Military personnel may require lockers in support of mandatory physical training requirements • The number of military personnel contributing to this space requirement is supported by an official personnel loading report • Other justification"]
          - ["Mailroom", "A mailroom accommodates processing and distribution of a facility’s incoming and outgoing mail and parcels. A mailroom must be individually justified for operational, site specific or other reasons such as large size of organization. Office space for mailroom personnel is already accounted for within the office space loading above.", "Allocate 40 NSF for every 50 personnel assigned", "• Mission or functions performed • Organization has 200 or more personnel • Access to the central postal facility is greater than a 15-minute drive time. • Security requirements warrant a standalone mailroom • Hours of operation • Other justification"]
        rows: []
      - table_id: "Table 61010-7"
        caption: "2. Functional Support Group Space Types"
        page: 13
        loading_driver: "Personnel"
        headers:
          - ["Observation Room", "An observation room is for monitoring interviews. Located adjacent to one or two interview rooms, it provides sufficient space for a small table, two chairs, and audiovisual recording equipment. One- way glass windows share common walls with the interview room(s). If feasible, consider using CCTV feeds rather than providing space for an observation room.", "Allocate one observation room at 100 NSF", "• Mission or functions performed • Applicable to certain Echelon II IG functions • Applicable to certain NCIS functions • Address feasibility of using CCTV feeds instead of providing an observation room • Other justification (human resource functions, polygraph functions, speech therapy functions, etc.)"]
          - ["Secure Storage Room", "A Secure Storage Room provides a separate lockable room for storage of sensitive or high-value equipment.", "Allocate one secure storage room at 100 NSF", "• Mission or functions performed • Applicable to certain NCIS functions • Other justification"]
          - ["Shipping / Receiving Area", "A shipping/receiving area accommodates loading and unloading of a wide variety of supplies and services necessary for operations. Most items can be stored in racks and stacked up to eight feet in height, while heavy items such as bulk paper supplies must remain on pallets. A shipping/receiving area must be individually justified for operational, site specific or other reasons such as large size of organization.", "Allocate 80 NSF for every 50 personnel assigned", "• Mission or functions performed • Organization has 200 or more personnel • Access to a central shipping/receiving facility is greater than a 15-minute drive time • Security requirements warrant a standalone shipping/receiving area • Hours of operation • Other justification"]
        rows: []
      - table_id: "Table 61010-7"
        caption: "2. Functional Support Group Space Types"
        page: 14
        loading_driver: "Personnel"
        headers:
          - ["Shower Room", "A shower room provides one or more shower stalls and is typically collocated with a bathroom and/or locker room. • Showers authorized in support of personnel performing 24-7 operations, without access to fitness centers. Provide one shower for every 10 persons of largest shift. • Showers authorized in support of military personnel physical training requirements, without access to fitness centers. Provide one shower for every 20 military personnel assigned. In both cases, a ratio of 80 / 20, male / female (ratio may go up as staffing structure dictates but not lower than 80 / 20), should be used for planning purposes. Use the guidance above to determine the number of showers required.", "Allocate showers at 20 NSF each", "• Mission or functions performed • Access to a fitness center by walking is 5 minutes or greater or a 15-minute drive time. • Military, civilian and/or contractor personnel may require showers in support of 24-7 shift or emergency operations • Military personnel may require showers in support of mandatory physical fitness requirements • The number of military personnel contributing to this space requirement is supported by an official personnel loading report. • Other justification is acceptable, particularly as it applies to mission integrity and readiness."]
          - ["Technical Equipment Area", "A technical equipment area is used for check-in /check- out and charging of government issued equipment (cell phones, ELMRS radios, laptops, etc.)", "Allocate one technical equipment area at 100 NSF", "• Mission or functions performed • Applies to CCN 89051 • Other justification"]
        rows: []
      - table_id: "Table 61010-7"
        caption: "2. Functional Support Group Space Types"
        page: 15
        loading_driver: "TBD"
        headers:
          - ["Technical Publications Library", "A technical publications library provides ready access to technical manuals, handbooks, and other guidance. Note that the need for this space type has diminished, as many resources are now readily available online. As a space saving measure, consider combining technical libraries within other spaces such as small conference/training rooms, rather than providing a separate allocation. No planning factors exist for this type of space. A space analysis is required.", "Allocate NSF space requirement based on specific technical publications library needs of organization", "• Mission or functions performed • Function(s) supported (e.g., architecture, engineering, legal, other) • Number and size of technical libraries required. • Other justification"]
          - ["Vault Room", "A vault room is a secured area for handling classified material. It typically includes a worktable area and access to one or more shared SIPRNet workstations. Assume 48 NSF per workstation plus an additional 16 NSF per workstation to account for a central worktable area. The basic allocation factor becomes 64 NSF per workstation. The number of workstations required is provided/verified by the special security officer (SSO) or security manager.", "Allocate 64 NSF per workstation", "• Mission or functions performed • Number of workstations required. • Number and size of vaults required if more than one. • Other justification"]
          - ["Other Functional Support Space", "This is a user-defined, functional support space type and allocation. It is intended for “one-off” space types not included above.", "Allocate NSF for this user-defined space type", "Provide justification for this user defined space requirement"]
        rows: []
      - table_id: "Table 61010-7"
        caption: "3. Security Group Space Types"
        page: 16
        loading_driver: "Personnel"
        headers:
          - ["Entry Control Area", "An entry control area may be authorized for secure facilities allowing for orderly check-in and checkout. The entry control area provides for one entry and one exit channel adjacent to one or more security watch stations. This area includes an additional 20 NSF for every 50 personnel assigned to the organization to accommodate transit of building personnel though the entry control area. Security watch station(s) are a separate allocation (see below).", "Allocate one entry control area at 100 NSF plus 20 NSF for every 50 personnel assigned", "• Mission or functions performed. • Applicable to certain operational functions. See 131 series justification guidelines. • Other justification"]
          - ["Secure Visitor Waiting Area", "A secure visitor waiting area may be authorized for secure facilities. This space type may also apply to NCIS functions and certain Echelon II Inspector General functions. In this capacity, it separates individuals under investigation or awaiting interview from other visitors and ongoing investigations. This separate waiting area helps to maintain security, protect the integrity of investigations, and avoid compromising the facts and circumstances surrounding a criminal inquiry.", "Allocate one secure visitor waiting area at 120 NSF", "• Mission or functions performed • Applicable to certain operational functions. See 131 series justification guidelines. • Applicable to certain Echelon II IG functions and NCIS functions • Other justification"]
          - ["Security Watch Station", "A security watch station provides space to house a security officer and security system monitoring equipment. A security watch stations is typically located adjacent to a lobby or quarterdeck area to control building ingress and egress.", "Allocate NSF based on specific security office requirements", "• Mission - Organization’s mission requires security beyond that provided by the host installation • Size – Organization’s size requires security beyond that provided by the host installation • Location – Organization’s location is geographically separated from the host installation • Other justification"]
        rows: []
      - table_id: "Table 61010-7"
        caption: "3. Security Group Space Types"
        page: 17
        loading_driver: "TBD"
        headers:
          - ["Special Security Officer Suite", "A special security officer (SSO) suite is a multifunctional area containing, but not limited to, a reception area, indoctrination area, photography area, vault space, and office space for the SSO. An SSO suite may be required depending on the TS/SCI classification level and where SCIF or SAP facilities are present.", "Allocate NSF based on 131 series space planning factors", "• Mission or functions performed • See 131 series justification guidelines • Other justification"]
          - ["Weapons Vestibule and Vault", "A weapons vestibule and vault are for the secure storage of weapons. The vestibule and vault are actually two separate rooms. The vestibule is equipped with individual lockers for each issued weapon, a cleaning counter with proper ventilation, and a safety loading/unloading barrel. Include a hazardous materials storage cabinet for solvent and cleaning materials. The vault is equipped with racks.", "Allocate one weapons vestibule and vault at 120 NSF", "• Mission or functions performed • Applicable to certain operational functions • Applicable to certain NCIS functions • Applicable to certain security functions • Other justification"]
          - ["Other Security Space", "This is a user-defined, security space type and allocation. It is intended for “one-off” space types not included above.", "Allocate NSF for this user- defined space type", "• Provide justification for this user defined space requirement"]
        rows: []
      - table_id: "page_17_table_12"
        caption: ""
        page: 17
        loading_driver: "TBD"
        headers:
          - ["Circulation", "All special purpose spaces are assumed to be enclosed. A circulation multiplier of 0.12 is multiplied by the net special purpose space subtotal.", "Allocate NSF based on: (0.12) (net special purpose space subtotal)", "• Space type does not require justification"]
        rows: []
      - table_id: "Table 61010-9"
        caption: "Net-To-Gross Space Types"
        page: 18
        loading_driver: "Personnel"
        headers:
          - ["Adjust Building Height (option)", "By default, the “Adjust Building Height” option is not applied (not checked), allowing the Admin BFR Generator to optimize the number of above ground floors (stories). If preparing BFR for an entire organization, use the default option. If preparing project level BFR and the number of stories is known, apply this option and adjust the number of floors accordingly. If preparing BFR for an individual component of an organization with less than 100 personnel, apply this option and adjust the number of floors to one.", "Number of above ground floors is variable", "• This option does not require justification Note: Once the number of above ground floors is established, a “net average floor area” is calculated for use in follow-on calculations."]
          - ["Bathrooms", "The number of toilet fixtures is based on UFC 3-420-01, Plumbing Systems. Bathrooms are assumed to be located on each floor. For planning purposes, bathrooms allocations are based on standardized modules and the number of persons per floor.", "Allocate NSF based on: See Bathroom Allocations table", "• Space type does not require justification"]
        rows: []
      - table_id: "Table 61010-9"
        caption: "Net-To-Gross Space Types"
        page: 19
        loading_driver: "Personnel"
        headers:
          - ["Electrical Space", "An electrical room houses electrical equipment for power distribution to other areas of a building. Multi-story buildings will have at least one electrical room per floor. The total allocation is equivalent to 60% of central mechanical room allocation.", "Allocate NSF based on: x= (y/69.2)1.053 (0.6), where x = electrical space, y= net bldg.. area", "• Space type does not require justification"]
          - ["Elevator Hoistway", "An elevator used for the movement of personnel must be designed as a passenger elevator. Passenger elevators may be used for general freight loading by using a heavy-duty interior to resist damage from hand trucks. For planning purposes, assume elevator must be able to accommodate an ambulance type stretcher (84\" X 24\") and a 4,000-pound load capacity.", "For 2 to 4 stories, allocate one hydraulic elevator per 10,000 NSF of avg. floor area at 82 NSF each x no. of floors For 5 to 10 stories, allocate one traction elevator per 10,000 NSF of avg. floor area at 91 NSF each x no. of floors", "• Space type does not require justification"]
        rows: []
      - table_id: "Table 61010-9"
        caption: "Net-To-Gross Space Types"
        page: 20
        loading_driver: "TBD"
        headers:
          - ["Elevator Machine Room", "An elevator machine room contains the elevator machine equipment and controller. One elevator machine room is allocated for each elevator.", "For 2 to 4 story buildings, allocate one machine room per elevator per 10,000 NSF of ground floor area at 72 NSF each. For 5 to 10 story buildings, allocate one machine room per elevator per 10,000 NSF of ground floor area at 152 NSF each.", "• Space type does not require justification Note: Net ground floor area is equal to net average floor area."]
          - ["Janitor’s Closet", "A janitor’s closet accommodates all equipment and supplies to include a 24- inch square mop basin, a wall- mounted mop rack, and three feet of 10-inch wide wall shelving.", "Allocate NSF based on: (one per 10,000 NSF of avg. floor area) (20 NSF/each) (# floors)", "• Space type does not require justification"]
        rows: []
      - table_id: "Table 61010-9"
        caption: "Net-To-Gross Space Types"
        page: 21
        loading_driver: "Personnel"
        headers:
          - ["Mechanical Space", "For planning purposes, assume a variable air volume system is used with a central (primary) mechanical room located on the ground floor and one or more distributed (secondary) fan rooms located on each floor. The following equation estimates the central mechanical room area for an office building: • x=(y/69.2)1.053, where x = size of mechanical room (NSF) and y = net building area (NSF) The following equation estimates the area for all fan rooms: • x=(y/58)1.087, where x = size of fan rooms (NSF) and y = net building area (NSF).", "Allocate NSF based on: x = (y/69.2)1.053 + (y/58)1.087 where x = sum of mechanical spaces and y = net building area", "• Space type does not require justification"]
          - ["Primary Circulation Multiplier", "Primary circulation consists of the main circulation routes (hallways) connecting to the building core and common spaces (elevators, stairwells). This multiplier accounts for lobby / quarterdeck areas, but not the entry control area, security watch stations or secure visitor waiting areas listed above. Primary circulation is associated with net-to-gross space, unlike secondary circulation space, which is associated with the “net building area”.", "Allocate NSF based on: (primary circulation multiplier) (net building area - secondary circulation areas)", "• Space type does not require justification"]
          - ["Stairwell", "A vertical penetration in a multi-floor building for personnel egress. For planning purposes, one story is assumed to be 12 feet in height.", "Allocate NSF based on: (one per 10,000 NSF of avg. floor area) (200 NSF/each) (# floors)", "• Space type does not require justification"]
        rows: []
      - table_id: "Table 61010-9"
        caption: "Net-To-Gross Space Types"
        page: 22
        loading_driver: "TBD"
        headers:
          - ["Telecom Room", "Telecommunication rooms enable telephone and computer connectivity throughout a building, providing space for telephone switches and rack-mounted computer equipment.", "Allocate NSF based on: (one per 10,000 NSF of avg. floor area) (110 NSF/each) (# floors)", "• Space type does not require justification"]
          - ["Vestibule", "A building entrance vestibule serves a dual purpose. First, it helps mitigate temperature differences between the indoor and outdoor environment and secondly, provides an area where people entering the building can wipe their feet on an appropriate surface.", "Allocate NSF based on: (one per 10,000 NSF of ground floor area) (60 NSF/ each)", "• Space type does not require justification Note: Net ground floor area is equal to net average floor area."]
          - ["Other NTG Space1", "This is a user-defined NTG space type and allocation. It is intended for “one-off” space types not included above.", "Allocate NSF requirement for this user- defined space type.", "• Provide justification for this user defined space type"]
        rows:
          - ["Other NTG Space2", "This is a second user-defined NTG space type and allocation. It is intended for “one-off” space types not included above.", "Allocate NSF requirement for this user- defined space type.", "• Provide justification for this user defined space type"]
          - ["Adjust Building Width (option)", "By default, this option is not applied (not checked) and the Admin BFR Generator assumes a square footprint. Using the checkbox option allows the user to adjust the width of the building. The building width slider ranges from 30 feet wide to 210 feet wide. Building width affects the building perimeter and is used to calculate the area associated with exterior walls.", "Building width and length are variable", "• This option does not require justification but should only be applied if site specific project requirements are known. • Note: Daylighting and natural ventilation cooling can be important energy-saving strategies, and both require one dimension of the building to be relatively narrow, in the order of 45 to 60 ft."]
      - table_id: "Table 61010-9"
        caption: "Net-To-Gross Space Types"
        page: 23
        loading_driver: "TBD"
        headers:
          - ["Exterior Wall Thickness Area", "Accounts for the square footage associated with exterior walls. Exterior wall thickness is assumed to be 16 inches (1.33 feet) thick. By default, the Admin BFR Generator applies this space type.", "Allocate NSF based on: (average net floor area perimeter) (wall thickness) (# floors)", "• Space type does not require justification"]
        rows: []
      - table_id: "page_23_table_19"
        caption: ""
        page: 23
        loading_driver: "TBD"
        headers:
          - ["NTG Factor", "Once the net building area and net-to-gross space total have been established, the Net-To- Gross (NTG) factor can be calculated.", "NTG factor = (net bldg area + NTG space total) / (net bldg area)", "Justification Guidelines: • Not applicable"]
        rows: []
      - table_id: "page_23_table_20"
        caption: ""
        page: 23
        loading_driver: "TBD"
        headers:
          - ["NTG Factor Override", "The NTG Factor Override function is provided within the Admin BFR Generator for situations in which an alternative NTG gross factor is required. By default, this function is not applied (not checked).", "NTG factor is variable", "Justification Guidelines: • Admin space within another category code that has a higher or lower NTG factor • Admin buildings must conform to host nation construction standards, which may dictate a higher NTG factor • Other justification"]
        rows: []
