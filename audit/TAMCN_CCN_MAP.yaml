# Layer 5 doctrine table, TAMCN to facility CCN map.
# Loaded by pipeline/etl.py to populate the TE NOTE and CCN columns.
# Closes pipeline/validate.py Check 8 (Equipment accounting) for any
# TAMCN that matches a rule; unmatched TAMCNs surface as orphans.
#
# Authority: FC 2-000-05N (Marine Corps BFR), Series 100 and 200
# facility category tables; USMC TAMCN dimensional table (T/E
# doctrine); NAVFAC P-72 Category Codes (DON Facility Category Codes,
# the parent dictionary FC 2-000-05N Appendix A draws from); the
# observed CCN inventory in the CLB-4 SW BFR (one example, not a
# gold standard).
#
# Status: STARTER. Rules are organized by TAMCN commodity letter
# (position 1) and class indicator (typically position 7). Confidence
# levels reflect doctrinal certainty:
#   high   = TAMCN family is unambiguously a single facility category
#            (e.g., M-class small arms must live in an armory).
#   medium = inferred from observed CLB-4 inventory plus commodity
#            convention; TBD pending FC 2-000-05N Series 200
#            ratification.
#   low    = best-fit; flagged for SME review.
# Apex Omega rule 4 applies. TBD rule rows (facility_ccn: TBD) are
# not silently filled with a guess; the matcher skips them and the
# TAMCN surfaces as an orphan in pipeline/validate.py Check 8.
#
# Apex Omega rule 7 applies. Every TAMCN that lands on a CCN here
# can be traced back to (a) the rule id and (b) the rule's citation
# block in this file.

provenance:
  authority: "FC 2-000-05N (Marine Corps BFR), Series 100 and 200
              facility category tables; USMC TAMCN dimensional table;
              NAVFAC P-72 Category Codes (DON Facility Category Codes)"
  ratified_against: "TBD pending FC 2-000-05N Series 100
                     (fc_2_000_05n_100series_12_10_2025.pdf,
                     version 100.20251210, 10 Dec 2025) and Series 200
                     (fc_2_000_05n_200series_05_16_2025.pdf,
                     version 200.20250516, 16 May 2025) PDF
                     extraction via audit/extract_planning_factors.py"
  source_date: "TBD"
  schema_version: "0.1"
  observed_inventory: "885 TAMCN data rows across 412 unique TAMCNs
                       in four CLB-4 company TFSMS exports (M29111,
                       M29112, M29113, M29114). Commodity prefixes
                       observed: A (110), B (137), C (307), D (61),
                       E (219), H (12), J (6), K (14), M (3), T (12)."

# TAMCN syntactic guard. Matched first; rows that fail this regex
# are not equipment rows and are not eligible for CCN attribution.
# USMC TAMCN format is one commodity letter, four or five digits,
# zero or more class/sub-class letters. Length range 6 to 9.
tamcn_validator: "^[A-Z][0-9]{4,5}[A-Z0-9]{0,3}$"

# Rule list. Evaluated top-to-bottom; first regex match wins. The
# regex is anchored against the TAMCN string after upper-casing and
# stripping whitespace. facility_ccn must be a CCN that appears in
# the unit's CCN list, otherwise pipeline/validate.py Check 8 will
# flag the row as an unknown-CCN reference.
rules:

  # E-prefix: Weapons, Optics, EOD

  - id: weapons_small_arms
    description: "M-class items: rifles, carbines, pistols, shotguns,
                  machine guns, grenade launchers, suppressors. All
                  small arms and crew-served weapons must be stowed
                  in an armory under MCO 5530.14A (Marine Corps
                  Physical Security Program)."
    pattern: "^E[0-9]{4,5}M[A-Z0-9]?$"
    facility_ccn: "14345"
    confidence: high
    citations:
      - source: "FC 2-000-05N Appendix A (NAVFAC P-72 / DON Facility
                 Category Codes)"
        section: "CCN 143 45, Armory"
        date: "2019-06-27 (Appendix A extraction date)"
      - source: "MCO 5530.14A (Marine Corps Physical Security Program)"
        section: "Arms, Ammunition, and Explosives storage"
        date: "TBD pending current change-page verification"

  - id: weapons_optics_sights
    description: "B-class items in the E commodity: telescopes,
                  reflex sights, bore optics, fire control optics,
                  thermal sights, night vision sights mounted on
                  weapons. Stored with their host weapons in the
                  armory."
    pattern: "^E[0-9]{4,5}B[A-Z0-9]?$"
    facility_ccn: "14345"
    confidence: medium
    citations:
