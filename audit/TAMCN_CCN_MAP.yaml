unmapped_disposition:
  emit: orphan
  message: "TAMCN does not match any rule pattern; SME review
            required to author a new rule or to mark the equipment
            as exempt from facility loading"
  do_not_silently_drop: true

# Notes for SMEs filling out this table:
#
# 1. Each rule's regex matches the full TAMCN string after upper-casing
#    and stripping whitespace. The patterns use the USMC TAMCN
#    convention: position 1 is the commodity letter, positions 2 to 6
#    are digits (the item identifier), position 7 is the class
#    indicator, and positions 8 to 9 (when present) are sub-class
#    variants.
#
# 2. Confidence levels: "high" rules have explicit doctrinal authority
#    (e.g., armory storage of weapons under MCO 5530.14A). "medium"
#    rules are inferred from CLB-4 SW BFR observed inventory plus
#    commodity convention. "low" rules are best-fit and must be
#    ratified against FC 2-000-05N Series 100/200 before a downstream
#    BFR is releasable.
#
# 3. facility_ccn = "TBD" rule rows are intentional. The matcher must
#    not substitute a guess; the TAMCN surfaces as an orphan in the
#    validator's Check 8.
#
# 4. The default admin/HQ CCN (61072 in CLB-4) is unit-type dependent.
#    Aviation squadrons, MEU command elements, depots, schoolhouses,
#    and recruit depots have different admin CCNs. The TAMCN-to-CCN
#    rules above do not depend on admin CCN, so this map is
#    portable across unit types; per-unit-type variation lives in
#    audit/UNIT_TYPE_DEFAULTS.yaml (Track 6).
#
# 5. The CLB-4 SW BFR's hidden/broken CCN sheets (14312, 14326, 21710,
#    21730, 44112, 45110, round-1 finding) target the same six CCNs
#    that this rule table maps equipment into. That is not a
#    coincidence; CLB-4 doctrine assumes those facilities exist even
#    though the corresponding sheets were never repaired. A generated
#    BFR that maps equipment into these CCNs will have non-empty
#    sheets and Check 8 will pass.
