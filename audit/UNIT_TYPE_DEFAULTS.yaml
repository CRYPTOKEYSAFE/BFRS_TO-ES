# Per-unit-type default values for the BFR pipeline.
#
# Loaded by pipeline/classify.py to resolve unit-type-dependent
# defaults (currently admin_ccn). The classifier merges in this
# order: rule-table defaults (lowest precedence) <- this file's
# unit_types[<type>] entry <- the unit profile's explicit
# unit_context fields (highest precedence). Apex Omega rule 4
# applies: when a unit_type's admin_ccn is "TBD", the classifier
# emits unclassified for the affected billets so the validator's
# Check 7 surfaces them, instead of substituting a guessed CCN.
#
# Authority: FC 2-000-05N (Marine Corps BFR), NAVFAC P-72 Category
# 610 series (Administrative Facilities). The 610 series carries
# multiple admin sub-categories that vary with the echelon and
# mission of the occupying organization (operational forces vs.
# higher headquarters vs. base support, etc.). Until FC 2-000-05N
# Series 100 is ratified in this repo, only the CLB observation is
# at confidence high; every other unit type is confidence low and
# its admin_ccn is TBD.
#
# Status: STARTER. CLB confidence high (observed in CLB-4 SW BFR);
# every other unit-type slot is TBD pending FC 2-000-05N Series 100
# ratification. Add a row when a new unit type comes through; do
# not extrapolate from CLB.

provenance:
  authority: "FC 2-000-05N (Marine Corps BFR), NAVFAC P-72
              Category 610 (Administrative Facilities)"
  ratified_against: "TBD pending FC 2-000-05N Series 100
                     (fc_2_000_05n_100series_12_10_2025.pdf,
                     version 100.20251210, 10 Dec 2025) PDF
                     extraction via audit/extract_planning_factors.py"
  source_date: "TBD"
  schema_version: "0.1"

# Default fallback when a unit profile does not declare unit_type
# or declares one not in this table. Surfaces the affected billets
# as orphans rather than substituting a guess (Apex Omega rule 4).
default:
  admin_ccn: "TBD"
  fallback_behavior: orphan
  message: "unit_type not declared in unit profile or unknown to
            UNIT_TYPE_DEFAULTS.yaml; declare unit_type and add a
            row here before generating a BFR for this unit"

# Per-unit-type defaults. Add a row when a new unit type is
# encountered. Each row carries citations.
unit_types:

  CLB:
    description: "Combat Logistics Battalion (e.g., CLB-4, CLB-5)
                  in MLG / MEF structure"
    admin_ccn: "61072"
    confidence: high
    citations:
      - source: "Observed CLB-4 SW BFR (M29030, 3d MLG, MCIPAC,
                 MCB Camp Butler), 61072 BN HQ Admin clean rebuild
                 sheet"
        section: "61072 sheet, rebuilt clean per audit/STYLE_GUIDE.md"
        date: "2026-02"
